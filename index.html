<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>For Nia ♡</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd6e7,#fff0f5,#ffeef8);
min-height:100vh;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:#444;
}

.container{
max-width:800px;
width:100%;
text-align:center;
background:rgba(255,255,255,0.4);
backdrop-filter:blur(10px);
padding:40px 25px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
position:relative;
z-index:2;
}

h1{
font-family:'Pacifico',cursive;
font-size:3.5rem;
color:#ff5d9e;
margin-bottom:15px;
animation:float 2s infinite alternate;
}

.subtitle{
font-size:1.2rem;
margin-bottom:35px;
}

button{
background:white;
border:none;
padding:15px 30px;
border-radius:999px;
font-size:1rem;
font-weight:500;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button:hover{
transform:scale(1.08);
}

.hidden{
display:none;
}

.message{
margin-top:35px;
animation:fadeIn 1s ease;
}

.message h2{
font-family:'Pacifico',cursive;
font-size:2.2rem;
color:#ff5d9e;
margin-bottom:20px;
}

.reasons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:25px;
}

.card{
background:white;
padding:20px;
width:220px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.3s;
font-size:1rem;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
}

.final{
margin-top:40px;
font-size:1.4rem;
font-family:'Pacifico',cursive;
color:#ff5d9e;
line-height:1.8;
}

.heart{
position:fixed;
top:-10%;
font-size:24px;
animation:fall linear infinite;
z-index:1;
}

@keyframes fall{
to{
transform:translateY(120vh);
}
}

@keyframes float{
from{
transform:translateY(0px);
}
to{
transform:translateY(-8px);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<h1>hey nia ♡</h1>

<p class="subtitle">
i gotta tell you something
</p>

<button onclick="showMessage()">
heres a secret
</button>

<div id="secret" class="hidden message">

<h2>i like you nia ♡</h2>

<div class="reasons">

<div class="card">
you're cute 🌸
</div>

<div class="card">
your personality is also cute ✨
</div>

<div class="card">
i mean like everything about u is so cute 💕
</div>

</div>

<div class="final">
seriously tho,<br>
you make my days better just by existing ♡
</div>

</div>

</div>

<script>

function showMessage(){
document.getElementById("secret")
.classList.remove("hidden");
}

for(let i = 0; i < 30; i++){

let heart = document.createElement("div");

heart.className = "heart";

heart.innerHTML = "💗";

heart.style.left = Math.random() * 100 + "vw";

heart.style.animationDuration =
(Math.random() * 5 + 4) + "s";

heart.style.opacity = Math.random();

document.body.appendChild(heart);

}

</script>

</body>
</html>
